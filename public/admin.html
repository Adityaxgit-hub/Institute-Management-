<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Institute Management Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #1d4ed8;
        --primary-dark: #1e3a8a;
        --accent: #0f766e;
        --bg: #f3f6fb;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --text: #0f172a;
        --muted: #64748b;
        --border: #dbe3ef;
        --success: #047857;
        --danger: #b91c1c;
        --warning: #b45309;
        --shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(14px);
      }

      .topbar-inner {
        max-width: 1280px;
        margin: auto;
        padding: 18px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-mark {
        width: 46px;
        height: 46px;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 0.78rem;
        letter-spacing: 0.04em;
        box-shadow: 0 12px 24px rgba(29, 78, 216, 0.22);
      }

      .brand h1 {
        margin: 0;
        font-size: 1.15rem;
        letter-spacing: -0.02em;
      }

      .brand span {
        display: block;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 500;
        margin-top: 2px;
      }

      .logout {
        height: 42px;
        padding: 0 18px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: white;
        color: var(--text);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .logout:hover {
        border-color: var(--primary);
        color: var(--primary);
        box-shadow: 0 10px 22px rgba(29, 78, 216, 0.12);
      }

      .page {
        max-width: 1280px;
        margin: auto;
        padding: 32px 28px 48px;
      }

      .page-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 26px;
      }

      .page-header h2 {
        margin: 0;
        font-size: 2rem;
        letter-spacing: -0.04em;
      }

      .page-header p {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .tabs {
        display: flex;
        gap: 10px;
        padding: 6px;
        background: white;
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }

      .tab {
        height: 42px;
        padding: 0 18px;
        border: none;
        border-radius: 12px;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .tab.active,
      .tab:hover {
        background: var(--primary);
        color: white;
      }

      .dashboard-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .card-header {
        padding: 22px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }

      .card-header h3 {
        margin: 0;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
      }

      .card-header p {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .record-count {
        min-width: 76px;
        height: 42px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: #eff6ff;
        color: var(--primary);
        font-weight: 800;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(160px, 1fr));
        gap: 16px;
        padding: 22px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--surface-soft);
      }

      .field label {
        display: block;
        margin-bottom: 8px;
        color: #334155;
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .field input {
        width: 100%;
        height: 44px;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0 14px;
        font: inherit;
        outline: none;
        background: white;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .field input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
      }

      .actions {
        display: flex;
        align-items: end;
      }

      .add {
        height: 44px;
        padding: 0 20px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 12px 22px rgba(29, 78, 216, 0.18);
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 820px;
      }

      th,
      td {
        padding: 16px 18px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: middle;
        font-size: 0.92rem;
      }

      th {
        background: #f8fafc;
        color: #475569;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 800;
      }

      tr:hover td {
        background: #fbfdff;
      }

      .delete {
        height: 36px;
        padding: 0 14px;
        border: 1px solid #fecaca;
        border-radius: 10px;
        background: #fff1f2;
        color: var(--danger);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .delete:hover {
        background: var(--danger);
        color: white;
        border-color: var(--danger);
      }

      .action-button {
        height: 36px;
        padding: 0 14px;
        border-radius: 10px;
        border: 1px solid transparent;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .approve {
        background: #dcfce7;
        color: #166534;
        border-color: #bbf7d0;
      }

      .approve:hover {
        background: #16a34a;
        color: white;
      }

      .reject {
        background: #fee2e2;
        color: #991b1b;
        border-color: #fecaca;
      }

      .reject:hover {
        background: #b91c1c;
        color: white;
      }

      .empty {
        padding: 42px 24px;
        text-align: center;
        color: var(--muted);
      }

      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        padding: 14px 18px;
        border-radius: 14px;
        background: #0f172a;
        color: white;
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(12px);
        pointer-events: none;
        transition: all 0.25s ease;
        font-weight: 700;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .sendnotif {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 22px 24px;
        margin-bottom: 32px;
      }

      .sendnotif h2 {
        margin: 0 0 12px;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
      }

      .sendnotif form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .sendnotif input,
      .sendnotif textarea,
      .sendnotif select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 14px;
        font: inherit;
        outline: none;
        background: white;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .sendnotif input:focus,
      .sendnotif textarea:focus,
      .sendnotif select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.1);
      }

      .sendnotif button {
        align-self: flex-start;
        height: 42px;
        padding: 0 20px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(
          135deg,
          var(--primary),
          var(--primary-dark)
        );
        color: white;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        white-space: nowrap;
        box-shadow: 0 12px 22px rgba(29, 78, 216, 0.18);
      }

      @media (max-width: 1020px) {
        .page-header,
        .topbar-inner {
          align-items: flex-start;
          flex-direction: column;
        }

        .tabs {
          width: 100%;
        }

        .tab {
          flex: 1;
        }

        .form-grid {
          grid-template-columns: repeat(2, minmax(160px, 1fr));
        }
      }

      @media (max-width: 640px) {
        .page {
          padding: 24px 16px 36px;
        }

        .topbar-inner {
          padding: 16px;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }
      }

      .leave-row-decided {
        opacity: 0.55;
        background: #f1f5f9 !important;
      }

      .leave-row-decided td {
        background: #f1f5f9 !important;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 14px;
        border-radius: 999px;
        font-weight: 800;
        font-size: 0.8rem;
        min-width: 90px;
      }

      .status-pending {
        background: #fff7ed;
        color: var(--warning);
        border: 1px solid #fed7aa;
      }

      .status-approved {
        background: #dcfce7;
        color: var(--success);
        border: 1px solid #bbf7d0;
      }

      .status-rejected {
        background: #fee2e2;
        color: var(--danger);
        border: 1px solid #fecaca;
      }

      .leave-action-btn {
        height: 36px;
        padding: 0 14px;
        border-radius: 10px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        border: 1px solid var(--border);
        background: white;
        margin-right: 6px;
      }

      .leave-action-btn.approve {
        border-color: #bbf7d0;
        color: var(--success);
      }

      .leave-action-btn.approve:hover {
        background: var(--success);
        color: white;
      }

      .leave-action-btn.reject {
        border-color: #fecaca;
        color: var(--danger);
      }

      .leave-action-btn.reject:hover {
        background: var(--danger);
        color: white;
      }

      .leave-action-btn[disabled] {
        cursor: not-allowed;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark">IMP</div>
          <div>
            <h1>Admin Dashboard</h1>
            <span>Institute record management</span>
          </div>
        </div>
        <button class="logout" onclick="logout()">Logout</button>
      </div>
    </header>

    <main class="page">
      <div class="sendnotif">
        <h2>Send Notification</h2>
        <form id="notif-form">
          <input
            type="text"
            id="notif-title"
            placeholder="Title (e.g. Exam Reminder)"
            required
          />
          <textarea
            id="notif-message"
            placeholder="Write your message here..."
            required
            style="min-height: 140px"
          ></textarea>
          <select id="notif-target">
            <option value="all">All users</option>
            <option value="student">Students only</option>
            <option value="faculty">Faculty only</option>
          </select>
          <button type="submit">Send Notification</button>
        </form>
        <p id="notif-status" style="color: var(--success); display: none">
          Notification sent!
        </p>
      </div>

      <div class="page-header">
        <div>
          <h2>Academic Administration</h2>
          <p>
            Maintain student records, faculty records, and course catalog data.
          </p>
        </div>
        <div class="tabs">
          <button
            class="tab active"
            id="tabStudents"
            onclick="showTab('students')"
          >
            Students
          </button>
          <button class="tab" id="tabFaculty" onclick="showTab('faculty')">
            Faculty
          </button>
          <button class="tab" id="tabCourses" onclick="showTab('courses')">
            Courses
          </button>
          <button class="tab" id="tabLeave" onclick="showTab('leave')">
            Leave Requests
          </button>
        </div>
      </div>

      <section class="dashboard-card">
        <div class="card-header">
          <div>
            <h3 id="sectionTitle">Students</h3>
            <p id="sectionDescription">View and manage registered students.</p>
          </div>
          <div class="record-count" id="recordCount">0</div>
        </div>

        <div class="form-grid" id="formContainer"></div>

        <div class="table-wrap">
          <table id="dataTable"></table>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>

    <script>
      document
        .getElementById("notif-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const body = {
            title: document.getElementById("notif-title").value,
            message: document.getElementById("notif-message").value,
            target: document.getElementById("notif-target").value,
          };

          const res = await fetch("/api/notifications/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          if (res.ok) {
            document.getElementById("notif-status").style.display = "block";
            e.target.reset();
            setTimeout(
              () =>
                (document.getElementById("notif-status").style.display =
                  "none"),
              3000,
            );
          } else {
            const error = await res.json().catch(() => ({}));
            showToast(error.error || "Failed to send notification");
          }
        });

      const sectionMeta = {
        students: {
          title: "Students",
          description: "View and manage registered students.",
          placeholder: "Student ID",
        },
        faculty: {
          title: "Faculty",
          description: "View and manage faculty records.",
          placeholder: "Faculty ID",
        },
        courses: {
          title: "Courses",
          description: "View and manage the course catalog.",
          placeholder: "Course ID",
        },
        leave: {
          title: "Leave Requests",
          description: "Review and approve faculty leave requests.",
          placeholder: "",
        },
      };

      let activeTab = "students";

      function logout() {
        localStorage.clear();
        location.href = "login.html";
      }

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2200);
      }

      function showTab(tab) {
        activeTab = tab;
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .getElementById("tab" + tab.charAt(0).toUpperCase() + tab.slice(1))
          .classList.add("active");
        document.getElementById("sectionTitle").textContent =
          sectionMeta[tab].title;
        document.getElementById("sectionDescription").textContent =
          sectionMeta[tab].description;
        loadCurrentTab();
      }

      function renderForm(fields, buttonLabel) {
        const form = document.getElementById("formContainer");
        if (!fields.length) {
          form.innerHTML = "";
          return;
        }

        form.innerHTML =
          fields
            .map(
              (field) => `
        <div class="field">
          <label for="${field.id}">${field.label}</label>
          <input id="${field.id}" type="${field.type || "text"}" placeholder="${field.placeholder}" />
        </div>
      `,
            )
            .join("") +
          `
        <div class="actions">
          <button class="add" onclick="addRecord()">${buttonLabel}</button>
        </div>
      `;
      }

      function renderTable(headers, rows, deleteId, deleteFn) {
        const table = document.getElementById("dataTable");
        document.getElementById("recordCount").textContent = rows.length;

        if (rows.length === 0) {
          table.innerHTML = `<tr><td colspan="${headers.length + 1}" class="empty">No records available.</td></tr>`;
          return;
        }

        table.innerHTML = `
        <thead>
          <tr>${headers.map((h) => `<th>${h}</th>`).join("")}<th>Action</th></tr>
        </thead>
        <tbody>
          ${rows
            .map(
              (row) => `
            <tr>
              ${row.cells.map((cell) => `<td>${cell}</td>`).join("")}
              <td>${row.actions || `<button class="delete" onclick="${deleteFn}('${deleteId(row)}')">Delete</button>`}</td>
            </tr>
          `,
            )
            .join("")}
        </tbody>`;
      }

      async function loadCurrentTab() {
        if (activeTab === "students") loadStudents();
        if (activeTab === "faculty") loadFaculty();
        if (activeTab === "courses") loadCourses();
        if (activeTab === "leave") loadLeaves();
      }

      async function loadStudents() {
        renderForm(
          [
            { id: "student_Id", label: "Student ID", placeholder: "S001" },
            {
              id: "first_name",
              label: "First Name",
              placeholder: "First name",
            },
            { id: "last_name", label: "Last Name", placeholder: "Last name" },
            {
              id: "email",
              label: "Email",
              type: "email",
              placeholder: "student@institute.edu",
            },
            { id: "phone", label: "Phone", placeholder: "Mobile number" },
            {
              id: "DOB",
              label: "Date of Birth",
              type: "date",
              placeholder: "",
            },
            { id: "dept_Id", label: "Department ID", placeholder: "1" },
          ],
          "Add Student",
        );

        const table = document.getElementById("dataTable");
        table.innerHTML = '<tr><td class="empty">Loading students...</td></tr>';

        try {
          const res = await fetch("/admin/students");
          const data = await res.json();
          renderTable(
            [
              "Student ID",
              "Name",
              "Email",
              "Phone",
              "DOB",
              "Department",
              "User ID",
            ],
            data.map((s) => ({
              cells: [
                s.student_Id,
                `${s.first_name} ${s.last_name}`,
                s.email,
                s.phone,
                s.DOB || "-",
                s.dept_Id,
                s.user_Id,
              ],
            })),
            (row) => row.cells[0],
            "deleteStudent",
          );
        } catch (e) {
          console.error(e);
          table.innerHTML =
            '<tr><td class="empty">Unable to load students.</td></tr>';
        }
      }

      async function loadFaculty() {
        renderForm(
          [
            {
              id: "faculty_first",
              label: "First Name",
              placeholder: "First name",
            },
            {
              id: "faculty_last",
              label: "Last Name",
              placeholder: "Last name",
            },
            {
              id: "faculty_email",
              label: "Email",
              type: "email",
              placeholder: "faculty@institute.edu",
            },
            {
              id: "faculty_phone",
              label: "Phone",
              placeholder: "Mobile number",
            },
            {
              id: "designation",
              label: "Designation",
              placeholder: "Professor",
            },
            { id: "dept_Id_faculty", label: "Department ID", placeholder: "1" },
          ],
          "Add Faculty",
        );

        const table = document.getElementById("dataTable");
        table.innerHTML = '<tr><td class="empty">Loading faculty...</td></tr>';

        try {
          const res = await fetch("/admin/faculty");
          const data = await res.json();
          renderTable(
            [
              "Faculty ID",
              "Name",
              "Email",
              "Phone",
              "Designation",
              "Department",
              "User ID",
            ],
            data.map((f) => ({
              cells: [
                f.faculty_Id,
                `${f.first_name} ${f.last_name}`,
                f.email,
                f.phone,
                f.designation,
                f.dept_Id,
                f.user_Id,
              ],
            })),
            (row) => row.cells[0],
            "deleteFaculty",
          );
        } catch (e) {
          console.error(e);
          table.innerHTML =
            '<tr><td class="empty">Unable to load faculty.</td></tr>';
        }
      }

      async function loadCourses() {
        renderForm(
          [
            { id: "course_Id", label: "Course ID", placeholder: "CS101" },
            {
              id: "course_name",
              label: "Course Name",
              placeholder: "Data Structures",
            },
            {
              id: "credits",
              label: "Credits",
              type: "number",
              placeholder: "4",
            },
            { id: "dept_Id_course", label: "Department ID", placeholder: "1" },
          ],
          "Add Course",
        );

        const table = document.getElementById("dataTable");
        table.innerHTML = '<tr><td class="empty">Loading courses...</td></tr>';

        try {
          const res = await fetch("/admin/courses");
          const data = await res.json();
          renderTable(
            ["Course ID", "Course Name", "Credits", "Department"],
            data.map((c) => ({
              cells: [c.course_Id, c.course_name, c.credits, c.dept_Id],
            })),
            (row) => row.cells[0],
            "deleteCourse",
          );
        } catch (e) {
          console.error(e);
          table.innerHTML =
            '<tr><td class="empty">Unable to load courses.</td></tr>';
        }
      }

      async function loadLeaves() {
        renderForm([], "");
        const table = document.getElementById("dataTable");
        table.innerHTML =
          '<tr><td class="empty">Loading leave requests...</td></tr>';

        try {
          const res = await fetch("/admin/faculty-leaves");
          const data = await res.json();
          renderLeaveTable(data);
        } catch (e) {
          console.error(e);
          table.innerHTML =
            '<tr><td class="empty">Unable to load leave requests.</td></tr>';
        }
      }

      function renderLeaveTable(data) {
        const table = document.getElementById("dataTable");
        document.getElementById("recordCount").textContent = data.length;

        if (data.length === 0) {
          table.innerHTML = `<tr><td colspan="7" class="empty">No leave requests available.</td></tr>`;
          return;
        }

        // Pending requests first, decided ones (Approved/Rejected) pushed to the bottom.
        // Within each group, newest first (data already comes ordered by applied_on DESC).
        const sorted = [...data].sort((a, b) => {
          const aPending = a.status === "Pending" ? 0 : 1;
          const bPending = b.status === "Pending" ? 0 : 1;
          return aPending - bPending;
        });

        table.innerHTML = `
    <thead>
      <tr>
        <th>Leave ID</th>
        <th>Faculty ID</th>
        <th>Faculty Name</th>
        <th>From</th>
        <th>To</th>
        <th>Reason</th>
        <th>Status / Action</th>
      </tr>
    </thead>
    <tbody>
      ${sorted.map(renderLeaveRow).join("")}
    </tbody>
  `;
      }

      function renderLeaveRow(l) {
        const isDecided = l.status === "Approved" || l.status === "Rejected";
        const rowClass = isDecided ? "leave-row-decided" : "";

        let actionHtml;

        if (l.status === "Approved") {
          actionHtml = `<span class="status-badge status-approved">✓ Approved</span>`;
        } else if (l.status === "Rejected") {
          actionHtml = `<span class="status-badge status-rejected">✕ Rejected</span>`;
        } else {
          actionHtml = `
      <button class="leave-action-btn approve" onclick="decideLeave(${l.leave_Id}, 'approve')">Approve</button>
      <button class="leave-action-btn reject" onclick="decideLeave(${l.leave_Id}, 'reject')">Reject</button>
    `;
        }

        return `
    <tr class="${rowClass}">
      <td>${l.leave_Id}</td>
      <td>${l.faculty_Id}</td>
      <td>${l.first_name} ${l.last_name}</td>
      <td>${l.from_date || "-"}</td>
      <td>${l.to_date || "-"}</td>
      <td>${l.reason || "-"}</td>
      <td>${actionHtml}</td>
    </tr>
  `;
      }
      async function addRecord() {
        if (activeTab === "students") return addStudent();
        if (activeTab === "faculty") return addFaculty();
        if (activeTab === "courses") return addCourse();
      }

      async function addStudent() {
        const payload = {
          student_Id: document.getElementById("student_Id").value,
          first_name: document.getElementById("first_name").value,
          last_name: document.getElementById("last_name").value,
          email: document.getElementById("email").value,
          phone: document.getElementById("phone").value,
          DOB: document.getElementById("DOB").value,
          dept_Id: document.getElementById("dept_Id").value,
        };
        try {
          const res = await fetch("/admin/students", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          showToast(data.message || data.error || "Student action completed");
          loadStudents();
        } catch (e) {
          console.error(e);
          showToast("Unable to add student");
        }
      }

      async function addFaculty() {
        const payload = {
          first_name: document.getElementById("faculty_first").value,
          last_name: document.getElementById("faculty_last").value,
          email: document.getElementById("faculty_email").value,
          phone: document.getElementById("faculty_phone").value,
          designation: document.getElementById("designation").value,
          dept_Id: document.getElementById("dept_Id_faculty").value,
        };
        try {
          const res = await fetch("/admin/faculty", {

          loadFaculty();
        } catch (e) {

        }
      }

      async function addCourse() {
        const payload = {
          course_Id: document.getElementById("course_Id").value,
          course_name: document.getElementById("course_name").value,
          credits: document.getElementById("credits").value,
          dept_Id: document.getElementById("dept_Id_course").value,

        try {
          const res = await fetch("/admin/courses", {
            method: "POST",

      }

      async function deleteStudent(id) {
        if (!confirm("Delete student?")) return;
        try {
          const res = await fetch("/admin/students/" + id, {
            method: "DELETE",
          });
          const data = await res.json();
          showToast(data.message || "Student deleted");
          loadStudents();
        } catch (e) {
          console.error(e);
          showToast("Unable to delete student");
        }
      }

      async function deleteFaculty(id) {
        if (!confirm("Delete faculty member?")) return;
        try {
          const res = await fetch("/admin/faculty/" + id, { method: "DELETE" });
          const data = await res.json();
          showToast(data.message || "Faculty deleted");
          loadFaculty();
        } catch (e) {
          console.error(e);
          showToast("Unable to delete faculty");
        }
      }

      async function deleteCourse(id) {
        if (!confirm("Delete course?")) return;
        try {
          const res = await fetch("/admin/courses/" + id, { method: "DELETE" });
          const data = await res.json();
          showToast(data.message || "Course deleted");
          loadCourses();
        } catch (e) {
          console.error(e);
          showToast("Unable to delete course");
        }
      }

      async function decideLeave(id, action) {
        const confirmed = confirm(
          action === "approve"
            ? "Approve this leave request?"
            : "Reject this leave request?",
        );
        if (!confirmed) return;

        const url = `/admin/faculty-leaves/${id}/${action}`;

        try {
          const res = await fetch(url, { method: "PUT" });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message || "Update failed");
          showToast(action === "approve" ? "Leave approved" : "Leave rejected");
          loadLeaves(); 
        } catch (e) {
          console.error(e);
          showToast(e.message || "Unable to update leave request");
        }
      }
      window.addEventListener("load", () => showTab("students"));
    </script>
  </body>
