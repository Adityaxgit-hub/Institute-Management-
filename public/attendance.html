<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Management</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#1d4ed8;
--primary-dark:#1e3a8a;
--accent:#0f766e;
--bg:#f3f6fb;
--surface:#fff;
--border:#dbe3ef;
--text:#0f172a;
--muted:#64748b;
--shadow:0 16px 36px rgba(15,23,42,.08);
--radius:18px;
}

*{
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

.topbar{

background:white;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
z-index:10;

}

.topbar-inner{

max-width:1150px;
margin:auto;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;

}

.brand{

display:flex;
align-items:center;
gap:15px;

}

.brand-mark{

width:45px;
height:45px;
background:linear-gradient(135deg,var(--primary),var(--accent));
border-radius:12px;
display:grid;
place-items:center;
color:white;
font-weight:bold;

}

.logout{

padding:10px 18px;
border:none;
border-radius:10px;
background:var(--primary);
color:white;
cursor:pointer;

}

.page{

max-width:1150px;
margin:auto;
padding:30px;

}

.card{

background:white;
border-radius:18px;
box-shadow:var(--shadow);
padding:25px;
margin-bottom:25px;

}

.card h2{

margin-top:0;

}

.date-box{

margin-top:15px;

}

input[type=date]{

padding:10px;
border:1px solid var(--border);
border-radius:8px;
font-size:15px;

}

table{

width:100%;
border-collapse:collapse;
margin-top:20px;

}

th{

background:#f8fafc;

}

th,td{

padding:15px;
border-bottom:1px solid var(--border);
text-align:left;

}

tr:hover{

background:#fafcff;

}

input[type=checkbox]{

width:20px;
height:20px;

}

.save-btn{

margin-top:25px;
padding:12px 30px;
background:var(--primary);
color:white;
border:none;
border-radius:10px;
font-size:15px;
font-weight:bold;
cursor:pointer;

}

.save-btn:hover{

background:var(--primary-dark);

}

</style>

</head>

<body>

<header class="topbar">

<div class="topbar-inner">

<div class="brand">

<div class="brand-mark">
IMP
</div>

<div>

<h3 style="margin:0;">Attendance Management</h3>

<small>Faculty Portal</small>

</div>

</div>

<button class="logout" onclick="history.back()">
Back
</button>

</div>

</header>

<div class="page">

<div class="card">

<h2 id="courseTitle">
Loading...
</h2>

<div class="date-box">

<label><b>Select Date</b></label>

<br><br>

<input type="date" id="date">

</div>

</div>

<div class="card">

<table>

<thead>

<tr>

<th>Roll No</th>

<th>Student Name</th>

<th>Present</th>

</tr>

</thead>

<tbody id="studentBody">

<tr>

<td colspan="3">

Loading Students...

</td>

</tr>

</tbody>

</table>

<button class="save-btn" onclick="saveAttendance()">

Save Attendance

</button>

</div>

</div>

<script>

const courseId=localStorage.getItem("courseId");

const courseName=localStorage.getItem("courseName");

document.getElementById("courseTitle").innerHTML=courseName;

document.getElementById("date").value=
new Date().toISOString().split("T")[0];

fetch(`/faculty/course/${courseId}/students`)
.then(res=>res.json())
.then(data=>{

let html="";

data.forEach(student=>{

html+=`

<tr>

<td>${student.student_Id}</td>

<td>${student.first_name} ${student.last_name}</td>

<td>

<input
type="checkbox"
class="present"
data-id="${student.student_Id}"
checked>

</td>

</tr>

`;

});

document.getElementById("studentBody").innerHTML=html;

});

function saveAttendance(){

const attendance=[];

document.querySelectorAll(".present").forEach(box=>{

attendance.push({

studentId:box.dataset.id,

status:box.checked ? "P":"A"

});

});

const data={

courseId:courseId,

date:document.getElementById("date").value,

attendance:attendance

};

fetch("/faculty/attendance",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)

})
.then(res=>res.json())
.then(result=>{

if(result.message=="Attendance Saved Successfully"){

alert("✅ Attendance Saved Successfully");

history.back();

}else{

alert(result.message);

}

});

}

</script>

</body>

</html>
