<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Attendance</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#1d4ed8;
--primary-dark:#1e3a8a;
--accent:#0f766e;
--bg:#f3f6fb;
--surface:#ffffff;
--border:#dbe3ef;
--text:#0f172a;
--muted:#64748b;
--shadow:0 16px 36px rgba(15,23,42,.08);
--radius:18px;
--success:#047857;
--danger:#b91c1c;
}

*{
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

.topbar{
background:white;
border-bottom:1px solid var(--border);
position:sticky;
top:0;
}

.topbar-inner{
max-width:1180px;
margin:auto;
padding:18px 28px;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
display:flex;
align-items:center;
gap:15px;
}

.brand-mark{
width:45px;
height:45px;
border-radius:12px;
background:linear-gradient(135deg,var(--primary),var(--accent));
display:grid;
place-items:center;
color:white;
font-weight:bold;
}

.backBtn{
background:var(--primary);
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.page{
max-width:1180px;
margin:auto;
padding:30px;
}

.card{
background:white;
border-radius:18px;
padding:25px;
box-shadow:var(--shadow);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#f8fafc;
}

th,td{
padding:15px;
border-bottom:1px solid var(--border);
text-align:left;
}

.status{
padding:6px 14px;
border-radius:20px;
font-weight:bold;
display:inline-block;
}

.present{
background:#dcfce7;
color:var(--success);
}

.absent{
background:#fee2e2;
color:var(--danger);
}

</style>

</head>

<body>

<header class="topbar">

<div class="topbar-inner">

<div class="brand">

<div class="brand-mark">
IMP
</div>

<div>

<h3 style="margin:0;">
Student Attendance
</h3>

<small>Institute Management Portal</small>

</div>

</div>

<button class="backBtn" onclick="window.location.href='student.html'">
Dashboard
</button>

</div>

</header>

<div class="page">

<div class="card">

<h2>Attendance Records</h2>

<table>

<thead>

<tr>

<th>Date</th>
<th>Course</th>
<th>Status</th>

</tr>

</thead>

<tbody id="attendanceBody">

<tr>

<td colspan="3">

Loading Attendance...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script>

function formatDate(date){

return new Date(date).toLocaleDateString("en-IN",{

day:"2-digit",
month:"short",
year:"numeric"

});

}

const userId=localStorage.getItem("userId");

fetch(`/student/${userId}`)
.then(res=>res.json())
.then(data=>{

let html="";

if(data.attendance.length===0){

html=`
<tr>
<td colspan="3" style="text-align:center;">
No Attendance Records Found
</td>
</tr>
`;

}else{

data.attendance.forEach(a=>{

html+=`

<tr>

<td>${formatDate(a.Attd_Date)}</td>

<td>${a.course_Id}</td>

<td>

<span class="status ${a.Status==="Present"?"present":"absent"}">

${a.Status}

</span>

</td>

</tr>

`;

});

}

document.getElementById("attendanceBody").innerHTML=html;

});

</script>

</body>

</html>
