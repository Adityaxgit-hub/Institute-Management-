<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Student Attendance</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #1d4ed8;
        --primary-dark: #1e3a8a;
        --accent: #0f766e;
        --bg: #f3f6fb;
        --surface: #ffffff;
        --border: #dbe3ef;
        --text: #0f172a;
        --muted: #64748b;
        --shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
        --radius: 18px;
        --success: #047857;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      .topbar {
        background: white;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
      }

      .topbar-inner {
        max-width: 1180px;
        margin: auto;
        padding: 18px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .brand-mark {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        display: grid;
        place-items: center;
        color: white;
        font-weight: bold;
      }

      .backBtn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
      }

      .page {
        max-width: 1180px;
        margin: auto;
        padding: 30px;
      }

      .card {
        background: white;
        border-radius: 18px;
        padding: 25px;
        box-shadow: var(--shadow);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th {
        background: #f8fafc;
      }

      th,
      td {
        padding: 15px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }

      .status {
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: bold;
        display: inline-block;
      }

      .present {
        background: #dcfce7;
        color: var(--success);
      }

      .absent {
        background: #fee2e2;
        color: var(--danger);
      }

      .course-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }

      .course-card {
        background: white;
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 22px;
        border-top: 4px solid var(--primary);
      }

      .course-card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 6px;
      }

      .course-card-header h3 {
        margin: 0;
        font-size: 1.05rem;
      }

      .course-card .course-id {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 4px;
      }

      .course-card .faculty-name {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 16px;
      }

      .attendance-row {
        margin-bottom: 14px;
      }

      .attendance-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.88rem;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .progress-track {
        height: 10px;
        background: #e8edf5;
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        border-radius: 999px;
        transition: width 0.4s ease;
      }

      .pct-green {
        color: #047857;
      }
      .pct-orange {
        color: #b45309;
      }
      .pct-red {
        color: #b91c1c;
      }

      .fill-green {
        background: #16a34a;
      }
      .fill-orange {
        background: #f59e0b;
      }
      .fill-red {
        background: #dc2626;
      }

      .course-meta {
        display: flex;
        gap: 18px;
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
        font-size: 0.82rem;
        color: var(--muted);
      }
    </style>
  </head>

  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div class="brand-mark">IMP</div>

          <div>
            <h3 style="margin: 0">Student Attendance</h3>

            <small>Institute Management Portal</small>
          </div>
        </div>

        <button class="backBtn" onclick="window.location.href = 'student.html'">
          Dashboard
        </button>
      </div>
    </header>

    <div class="page">
      <div class="card">
        <h2>Attendance by Course</h2>
        <div class="course-grid" id="courseGrid">
          <p>Loading attendance...</p>
        </div>
      </div>
    </div>

    <script>
      function getColorClass(pct) {
        if (pct >= 90) return "green";
        if (pct >= 75) return "orange";
        return "red";
      }

      function buildCourseCard(course) {
        const overallColor = getColorClass(course.overall_percentage);
        const monthlyColor = getColorClass(course.monthly_percentage);

        return `

<div class="course-card">

<div class="course-card-header">
<h3>${course.course_name}</h3>
</div>

<div class="course-id">${course.course_Id}</div>
<div class="faculty-name">👤 Faculty: ${course.faculty_name || "Not Assigned"}</div>

<div class="attendance-row">
<div class="attendance-label">
<span>Overall Attendance</span>
<span class="pct-${overallColor}">${course.overall_percentage}%</span>
</div>
<div class="progress-track">
<div class="progress-fill fill-${overallColor}" style="width:${course.overall_percentage}%"></div>
</div>
</div>

<div class="attendance-row">
<div class="attendance-label">
<span>This Month</span>
<span class="pct-${monthlyColor}">${course.monthly_percentage}%</span>
</div>
<div class="progress-track">
<div class="progress-fill fill-${monthlyColor}" style="width:${course.monthly_percentage}%"></div>
</div>
</div>

<div class="course-meta">
<span>📅 ${course.present_days}/${course.total_days} days (overall)</span>
<span>🗓️ ${course.monthly_present}/${course.monthly_total} days (month)</span>
</div>

</div>

`;
      }

      const userId = localStorage.getItem("userId");

      fetch(`/student/${userId}/attendance-summary`)
        .then((res) => res.json())
        .then((data) => {
          const grid = document.getElementById("courseGrid");

          if (!Array.isArray(data) || data.length === 0) {
            grid.innerHTML = `<p>No enrolled courses found.</p>`;
            return;
          }

          grid.innerHTML = data.map(buildCourseCard).join("");
        })
        .catch((err) => {
          console.error(err);
          document.getElementById("courseGrid").innerHTML =
            `<p>Unable to load attendance data.</p>`;
        });
    </script>
  </body>
</html>
